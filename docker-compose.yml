services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ir_agent
      POSTGRES_USER: ir_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ir_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ir-agent:
    build: .
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ir_agent:${POSTGRES_PASSWORD:-changeme}@postgres:5432/ir_agent
    volumes:
      - ./vector_db:/app/vector_db
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9000/health/live').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
