services:
  ir-agent:
    build: .
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - ./vector_db:/app/vector_db
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9000/health/live').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
